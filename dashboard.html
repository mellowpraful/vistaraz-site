<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard · MANNMITRA</title>
  <script>try{var t=localStorage.getItem("mannmitra_theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){}</script><link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <main class="container section">
    <h2 data-i18n="dashboard.title">Your Progress</h2>
    <div class="sub">A private view of your check-in history. Stored only on this device.</div>

    <div class="dash-grid" style="margin-bottom:24px">
      <div class="kpi"><div class="k-num" id="kChecks">0</div><div class="k-label">Check-ins logged</div></div>
      <div class="kpi"><div class="k-num" id="kAvg">–</div><div class="k-label">Avg mood</div></div>
      <div class="kpi"><div class="k-num" id="kJournals">0</div><div class="k-label">Journal entries</div></div>
      <div class="kpi"><div class="k-num" id="kStreak">0</div><div class="k-label">Day streak</div></div>
    </div>

    <div class="chart-wrap">
      <h3 style="margin-top:0">Mood over time</h3>
      <div id="chart"></div>
      <p id="noData" style="color:var(--text-muted)">No check-ins yet — <a href="checkin.html">do one now</a>.</p>
    </div>
  </main>

  <footer>
    MANNMITRA · मन मित्र. <span data-i18n="crisis.line">In crisis? 24x7 helplines</span>: <a href="crisis.html">14416</a>.
  </footer>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/state.js"></script>
  <script src="assets/js/common.js"></script>
  <script>
    function render(){
      const s = MANNMITRA.state.get();
      const checks = s.checkins;
      document.getElementById("kChecks").textContent = checks.length;
      document.getElementById("kJournals").textContent = s.journal.length;

      const moods = checks.map(c => c.mood).filter(Boolean);
      document.getElementById("kAvg").textContent = moods.length ? (moods.reduce((a,b)=>a+b,0)/moods.length).toFixed(1) : "–";

      // simple streak: count distinct days with a check-in
      const days = new Set(checks.map(c => new Date(c.ts).toDateString()));
      document.getElementById("kStreak").textContent = days.size;

      const chart = document.getElementById("chart");
      if(!checks.length){ document.getElementById("noData").style.display="block"; return; }
      document.getElementById("noData").style.display="none";
      const recent = checks.slice(-8);
      chart.innerHTML = recent.map(c => {
        const pct = (c.mood/10*100).toFixed(0);
        const d = new Date(c.ts); const lab = (d.getMonth()+1)+"/"+d.getDate();
        return `<div class="bar-row"><div class="bar-label">${lab}</div><div class="bar-track"><div class="bar-fill" style="width:0%" data-w="${pct}"></div></div><div style="width:34px;font-size:13px;color:var(--text-muted)">${c.mood}</div></div>`;
      }).join("");
      requestAnimationFrame(() => {
        chart.querySelectorAll(".bar-fill").forEach(b => b.style.width = b.getAttribute("data-w") + "%");
      });
    }
    render();
  </script>
</body>
</html>
