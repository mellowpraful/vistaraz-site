<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check-in · MANNMITRA</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <main class="container section">
    <h2 data-i18n="checkin.title">2-minute check-in</h2>
    <div class="sub" data-i18n="checkin.sub">No login. Your answer stays on this device.</div>

    <div class="panel">
      <label data-i18n="mood.q">How are you feeling right now?</label>
      <input type="range" id="mood" min="1" max="10" value="6" />
      <div class="mood-row"><span>😣 Worst</span><span id="moodVal">6 — Okay</span><span>😄 Great</span></div>

      <label data-i18n="sleep.q">Have you been sleeping well lately?</label>
      <select class="field" id="q1">
        <option value="yes">Yes, fine</option>
        <option value="no">No, struggling</option>
      </select>

      <label data-i18n="support.q">Do you feel supported by people around you?</label>
      <select class="field" id="q2">
        <option value="yes">Yes</option>
        <option value="no">No, I feel alone</option>
      </select>

      <label data-i18n="mind.q">Anything on your mind? (optional)</label>
      <textarea class="field" id="text" rows="3" placeholder="e.g. exams are crushing me..."></textarea>

      <div style="margin-top:22px">
        <button class="btn btn-primary" id="submit" data-i18n="seePath">See my path →</button>
      </div>

      <div id="result" style="margin-top:24px; display:none">
        <div id="sevPill"></div>
        <h3 id="routeTitle" style="margin:12px 0 6px"></h3>
        <p id="reasons" style="color:var(--text-muted)"></p>
        <div id="actions"></div>
      </div>
    </div>
  </main>

  <footer>
    MANNMITRA · मन मित्र. <span data-i18n="crisis.line">In crisis? 24x7 helplines</span>: <a href="crisis.html">14416</a>.
  </footer>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/state.js"></script>
  <script src="assets/js/triage.js"></script>
  <script src="assets/js/common.js"></script>
  <script>
    const moodEl = document.getElementById("mood");
    const moodVal = document.getElementById("moodVal");
    const w = v => v<=3?"Struggling":v<=6?"Okay":v<=8?"Good":"Great";
    moodEl.addEventListener("input", () => moodVal.textContent = moodEl.value + " — " + w(+moodEl.value));

    document.getElementById("submit").addEventListener("click", () => {
      const input = {
        mood: +moodEl.value,
        text: document.getElementById("text").value,
        answers: [document.getElementById("q1").value === "no",
                  document.getElementById("q2").value === "no"]
      };
      const r = MANNMITRA.triage.score(input);
      MANNMITRA.state.pushCheckin({ ts: Date.now(), mood: input.mood, severity: r.severity, text: input.text });
      MANNMITRA.state.setSeverity(r.severity);

      const pc = r.severity === "high" ? "pill-high" : r.severity === "medium" ? "pill-med" : "pill-low";
      document.getElementById("sevPill").innerHTML =
        `<span class="pill ${pc}">${MANNMITRA.i18n.t('severity')}: ${r.severity.toUpperCase()} · ${r.score}/100</span>`;
      document.getElementById("routeTitle").textContent =
        MANNMITRA.i18n.t('recommended') + ": " + MANNMITRA.triage.routeLabel(r.route);
      document.getElementById("reasons").textContent =
        r.reasons.length ? r.reasons.join(". ") + "." : "No acute signals detected.";

      let acts = "";
      if (r.route === "crisis") {
        acts = `<button class="btn btn-danger" onclick="MANNMITRA.common.triggerCrisis()">Get crisis support now</button>
                <a class="btn btn-ghost" href="peer.html">Or talk to a peer</a>`;
      } else if (r.route === "peer") {
        acts = `<a class="btn btn-primary" href="peer.html">Talk to a peer listener</a>
                <a class="btn btn-ghost" href="resources.html">Browse resources</a>`;
      } else {
        acts = `<a class="btn btn-primary" href="resources.html">Self-care & resources</a>
                <a class="btn btn-ghost" href="peer.html">Or talk to someone</a>`;
      }
      document.getElementById("actions").innerHTML = acts;
      document.getElementById("result").style.display = "block";

      if (r.severity === "high") setTimeout(() => MANNMITRA.common.triggerCrisis(), 400);
    });
  </script>
</body>
</html>
